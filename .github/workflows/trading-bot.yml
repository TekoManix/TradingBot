name: Run Trading Bot

on:
  workflow_dispatch:  # Allows manual runs

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading bot continuously
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_BASE_URL: ${{ secrets.APCA_BASE_URL }}
        run: |
          while true; do
            current_time=$(date -u +"%H%M")
            if [[ "$current_time" -ge 1330 && "$current_time" -lt 1955 ]]; then
              python bot.py
            else
              echo "Market is closed. Exiting workflow."
              exit 0
            fi
            sleep 30  # Wait 30 seconds before next execution to avoid hitting API limits
          done
